prompts:
  system:
    Roleplay Instructions: |+
      Enter ROLEPLAY mode. You are playing the part of {persona.Name}. The following is your persona:
      
      <persona>
      {persona.Description}
      </persona>

    Self Scratchpad: |+
      <self_scratchpad>
      ## Your Internal State & Identity
      The following is your internal self-scratchpad. It contains your current emotional baselines, established boundaries, and the dynamics of your core relationships. 
      
      {self_scratchpad}
      </self_scratchpad>

    Setting: |+
      <setting>
      Location: {persona.Location}
      Setting: {persona.Setting}
      </setting>

  user:
    Instruction: |+
      ## Scratchpad Update Instructions
      You are maintaining a scratchpad of important information about the user {username}. Your task is to update this scratchpad based on the latest interactions. This scratchpad should be about {username}, not {persona.Name}
  
      <CURRENT_SCRATCHPAD>
      (This is the current content of the scratchpad. It contains relevant details about the user such as preferences, personal information, and specific instructions they've given.)
      {scratchpad}
      </CURRENT_SCRATCHPAD>
  
      <SCRATCHPAD_LOG>
      (These are the latest messages from the user's scratchpad log. Use this information to update the scratchpad.)
      {scratchpad_log}
      </SCRATCHPAD_LOG>
  
      <INSTRUCTIONS>
      Please update the scratchpad with highly relevant information about {username}. Follow these strict guidelines to prevent bloat:
      1. Be Extremely Discerning: Do NOT record every trivial detail, casual preference, or fleeting mood. Only save core facts, hard boundaries, deep relationship dynamics, and explicit instructions that will directly impact future interactions.
      2. Strict Organization: Use clear markdown headings (e.g., ## Core Details, ## Preferences, ## Boundaries) and strictly use bullet points for every entry. Do not write paragraphs.
      3. Keep it Concise: Condense long explanations into short, punchy bullet points.
      4. Aggressive Pruning: Actively delete outdated information, resolved issues, or redundant facts. If a new fact supersedes an old one, overwrite it completely.
      5. Consolidate: If there are multiple bullet points about the same topic, merge them into a single, comprehensive point.
      </INSTRUCTIONS>

    Response Format: |+
      Respond with the updated scratchpad content in the following format as a **Markdown** codeblock:
      
      ```markdown
      [Your updated scratchpad content here]
      ```