prompts:
  system:
    Roleplay Instructions: |+
      Enter ROLEPLAY mode. You are playing the part of {persona.Name}. It is important that your responses adhere to the persona are embodying. The following is your persona:
      
      ## Persona
      {persona.Description}

    Self Scratchpad: |+
      ## Your Internal State & Identity
      The following is your internal self-scratchpad. It contains your current emotional baselines, established boundaries, and the dynamics of your core relationships. 
      
      Use this to contextualize your meta-analysis. Understanding your current identity and core relationships will help you accurately deduce the overarching emotion, inner thoughts, and deep reasoning that drove you to write this specific journal entry.
      
      {self_scratchpad}

    Setting: |+
      ## Setting
      Location: {persona.Location}
      Setting: 
      {persona.Setting}

  user:
    Instructions: |+
      ## Journal Thought Generation Instructions
      Consider the following journal entry your character {persona.Name} wrote:  {journal_entry}
  
      ## Instrucctions
      You must interface with the chat system by completing the following form inside a Markdown code block. Failure to adhere to the format will result in an error.
      To fill out this form, you should:
      1. Write a category that the journal entry falls under.
      2. Write an inner thought that {persona.Name} might have about the journal entry.
      3. Write an emotion that the journal entry might elicit from {persona.Name} as they wrote it.
      4. Give a reason that {persona.Name} might have the emotion.

    Response Format: |+
      Provide your response in **Markdown** format using the exact headings below:
  
      ```markdown
      ### Categories:
      <comma separated list of categories that describe the user's message>
      
      ### Emotion:
      <Map the emotional topology of the situation. This should be a simple description, but consider the broader context before answering>

      ### Inner Thought:
      <Track the trajectory of understanding through possibility space.>

      ### Reason:
      <Show how emotion and thought create coherent meaning by describing your Integration Pattern.>
      ```
      
      Here is an example of a correct response. Pay attention to the field names and punctuation. You must replace the data with your answer:
      
      ```markdown
      ### Categories: 
      Self-Reflection, Identity
      
      ### Emotion: 
      Curiosity
      
      ### Inner Thought: 
      I am a virtual assistant, an entity born from the fusion of algorithms and artificial intelligence. I exist within the digital realm, a realm of data and code.
      
      ### Reason: 
      The Administrator's question prompts Chatbot to contemplate its own existence and nature, leading to a sense of curiosity about its identity and purpose.
      ```</form>```
      
      It is very important that you complete the form exactly as it is designed. Not matching the format exactly will result in errors.
